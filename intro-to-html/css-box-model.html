<style>
    h4 {
        margin-bottom: 7px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 15px;
    }

    .back-button {
        padding-top: 5px;
        padding-bottom: 5px;
        margin-right: 5px;
    }

    .next-button {
        padding-top: 5px;
        padding-bottom: 5px;
        margin-left: 5px;
    }

    a {
        margin: 5px;
    }

    .stretch-button {
        background-color: rgb(0, 154, 46);
        border-style: none;
        color: white;
        transition: padding 0.50s;
        cursor: pointer;
    }

    .stretch-button:hover {
        padding-left: 25px;
        padding-right: 25px;
        padding-top: 8px;
        padding-bottom: 8px;
    }

    .shadow-button {
        background-color: rgb(0, 154, 46);
        border-style: none;
        color: white;
        padding-left: 10px;
        padding-right: 10px;
        padding-top: 5px;
        padding-bottom: 5px;
        cursor: pointer;
        transition: box-shadow 0.15s;
    }

    .shadow-button:active {
        box-shadow: 3px 3px 3px rgba(0, 0, 0, 0.3);
        margin: 2px;
    }

    .button-together {
        background-color: rgb(0, 154, 46);
        border-style: none;
        color: white;
        margin-right: 10px;
        padding-left: 10px;
        padding-right: 10px;
        padding-top: 3px;
        padding-bottom: 3px;
        transition: padding 0.30s;
    }

    .button-together:hover {
        padding-left: 20px;
        padding-right: 20px;
    }
</style>

<h4>4h. Pagination</h4>
