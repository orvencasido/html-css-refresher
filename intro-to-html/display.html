<!DOCTYPE html>
<html>

<head>
	<title>Display Block and Inline Block</title>
	<link rel="stylesheet" href="display.css">
</head>

<body>
	<h4>8a</h4>
	<input class="name-input" type="text" placeholder="Name">
	<input class="email-input" type="text" name="" placeholder="Email">

	<h4>8b</h4>
	<p class="text">Thanks for chatting with our customer support. Would you
		like to take our quick survey?
	</p>
	<button class="yes-button">Yes</button>
	<button class="no-button">No</button>

	<h4>8c</h4>
	<img class="google-img" src="Google_2015_logo.svg.png" alt="">
	<input class="google-input" type="text" name="" id="" placeholder="Search Google or Type URL">


	<h4>8d - Challenge</h4>
	<input class="sign-up-name" type="text" name="" placeholder="First Name">
	<input class="sign-up-last" type="text" name="" placeholder="Last Name">
	<input class="sign-up-email" type="text" name="" placeholder="Email">
	<button class="sign-up-button">Sign Up</button>

	<h4>8e - Uber</h4>
	<p class="uber-title">Request a Ride Now</p>
	<input class="uber-location" type="text" placeholder="Enter pickup location">
	<input class="uber-destination" type="text" placeholder="Enter destination">
	<button class="uber-request-button">Request Now</button>
	<button class="uber-schedule-button">Schedule for later</button>

</body>

</html>
